name: CI/CD Pipeline - Docker Deploy

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  DEPLOY_DIR: /opt/dong-medicine

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build Backend with Maven
        working-directory: dong-medicine-backend
        run: mvn clean package -DskipTests -B

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dong-medicine-frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: dong-medicine-frontend
        run: npm ci

      - name: Build Frontend
        working-directory: dong-medicine-frontend
        env:
          VITE_API_BASE_URL: /api
          VITE_KKFILEVIEW_URL: /kkfileview
          VITE_KKFILEVIEW_FILE_HOST: http://${{ secrets.SERVER_HOST }}:8080
        run: npm run build

      - name: Verify Frontend Build Output
        working-directory: dong-medicine-frontend
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist directory does not exist after build!"
            exit 1
          fi
          echo "Build output: $(find dist -type f | wc -l) files"

      - name: Upload Frontend Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dong-medicine-frontend/dist

  deploy:
    name: Deploy to Server
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Frontend Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dong-medicine-frontend/dist

      - name: Prepare deployment package
        run: |
          mkdir -p deploy-package
          cp docker-compose.yml deploy-package/
          cp -r dong-medicine-backend deploy-package/
          cp -r dong-medicine-frontend deploy-package/
          cp deploy/docker-deploy.sh deploy-package/
          chmod +x deploy-package/docker-deploy.sh

      - name: Create production .env file
        run: |
          cat > deploy-package/.env << EOF
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_PORT=3307
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          REDIS_PORT=6379
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION=86400000
          BACKEND_PORT=8080
          FRONTEND_PORT=80
          CORS_ALLOWED_ORIGIN=http://${{ secrets.SERVER_HOST }}
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          KKFILEVIEW_PORT=8012
          EOF

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config << EOF
          Host server
            HostName ${{ secrets.SERVER_HOST }}
            User ${{ secrets.SERVER_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            ConnectTimeout 30
            ServerAliveInterval 30
            ServerAliveCountMax 5
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy
        run: |
          ssh server "mkdir -p /tmp/deploy"
          scp -r deploy-package/. server:/tmp/deploy/
          
          ssh server 'bash -s' << 'SCRIPT'
          set -e
          cd /tmp/deploy
          chmod +x docker-deploy.sh
          export DOCKER_BUILDKIT=0
          sudo -E bash docker-deploy.sh
          SCRIPT

      - name: Verify
        run: |
          sleep 10
          ssh server 'docker ps --filter name=dong-medicine --format "table {{.Names}}\t{{.Status}}"'

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa

      - name: Summary
        if: always()
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: http://${{ secrets.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: http://${{ secrets.SERVER_HOST }}:8080" >> $GITHUB_STEP_SUMMARY
