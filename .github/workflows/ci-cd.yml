name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        working-directory: dong-medicine-backend
        run: |
          chmod +x mvnw
          ./mvnw test -B --no-transfer-progress -T 2C

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dong-medicine-frontend/package-lock.json

      - name: Install and Test
        working-directory: dong-medicine-frontend
        run: |
          npm ci --prefer-offline
          npm run test -- --passWithNoTests || true

  build-and-push:
    name: Build & Push
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      backend_image: ${{ steps.build-backend.outputs.imageid }}
      frontend_image: ${{ steps.build-frontend.outputs.imageid }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: ./dong-medicine-backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-backend:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          provenance: false
          sbom: false

      - name: Build and push frontend
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./dong-medicine-frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-frontend:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_KKFILEVIEW_URL=/kkfileview
            VITE_KKFILEVIEW_FILE_HOST=http://${{ secrets.SERVER_HOST }}:8080
          provenance: false
          sbom: false

      - name: Verify images pushed
        run: |
          echo "Backend image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-backend:latest"
          echo "Frontend image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-frontend:latest"
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-backend:latest
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-frontend:latest

  deploy:
    name: Deploy
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload docker-compose.yml
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p /opt/dong-medicine"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/dong-medicine/docker-compose.yml

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: false
          command_timeout: 25m
          script: |
            export PATH=$PATH:/usr/bin:/usr/local/bin
            COMPOSE_CMD="docker compose"
            APP_DIR="/opt/dong-medicine"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            
            echo "========== 清理旧容器 =========="
            $COMPOSE_CMD down --remove-orphans --timeout 10 2>/dev/null || true
            
            echo "========== 创建环境配置 =========="
            cat > .env << ENVEOF
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=86400000
            FRONTEND_PORT=80
            CORS_ALLOWED_ORIGIN=http://${{ secrets.SERVER_HOST }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            APP_RABBITMQ_ENABLED=true
            ENVEOF
            
            echo "========== 登录 GHCR =========="
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin || true
            
            echo "========== 拉取最新镜像 =========="
            echo "拉取 backend 镜像..."
            docker pull ghcr.io/${{ github.repository_owner }}/dong-medicine-backend:latest || echo "警告: backend 镜像拉取失败，将使用本地镜像"
            echo "拉取 frontend 镜像..."
            docker pull ghcr.io/${{ github.repository_owner }}/dong-medicine-frontend:latest || echo "警告: frontend 镜像拉取失败，将使用本地镜像"
            echo "镜像拉取完成"
            
            echo "========== 启动基础服务 (mysql, redis, rabbitmq, kkfileview) =========="
            $COMPOSE_CMD up -d mysql redis rabbitmq kkfileview
            
            echo "========== 等待基础服务就绪 =========="
            for i in $(seq 1 50); do
              MYSQL_STATUS=$(docker inspect --format='{{.State.Health.Status}}' dong-medicine-mysql 2>/dev/null || echo "unknown")
              REDIS_STATUS=$(docker inspect --format='{{.State.Health.Status}}' dong-medicine-redis 2>/dev/null || echo "unknown")
              RABBITMQ_STATUS=$(docker inspect --format='{{.State.Health.Status}}' dong-medicine-rabbitmq 2>/dev/null || echo "unknown")
              echo "[$i] MySQL: $MYSQL_STATUS, Redis: $REDIS_STATUS, RabbitMQ: $RABBITMQ_STATUS"
              if [ "$MYSQL_STATUS" = "healthy" ] && [ "$REDIS_STATUS" = "healthy" ] && [ "$RABBITMQ_STATUS" = "healthy" ]; then
                echo "✓ 基础服务就绪!"
                break
              fi
              if [ $i -eq 50 ]; then
                echo "✗ 基础服务未就绪"
                docker logs dong-medicine-mysql --tail 30 2>/dev/null || true
                docker logs dong-medicine-redis --tail 30 2>/dev/null || true
                docker logs dong-medicine-rabbitmq --tail 30 2>/dev/null || true
                exit 1
              fi
              sleep 5
            done
            
            echo "========== 启动后端 =========="
            $COMPOSE_CMD up -d backend
            
            echo "========== 等待后端就绪 (最多8分钟) =========="
            for i in $(seq 1 48); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' dong-medicine-backend 2>/dev/null || echo "unknown")
              echo "[$i] 后端状态: $STATUS"
              
              if [ "$STATUS" = "healthy" ]; then
                echo "✓ 后端服务就绪!"
                break
              fi
              
              if [ "$STATUS" = "unhealthy" ]; then
                echo "✗ 后端服务不健康，输出日志..."
                docker logs dong-medicine-backend --tail 100
                exit 1
              fi
              
              if ! docker ps --format '{{.Names}}' | grep -q dong-medicine-backend; then
                echo "✗ 后端容器已停止，输出日志..."
                docker logs dong-medicine-backend --tail 100
                exit 1
              fi
              
              if [ $((i % 6)) -eq 0 ]; then
                echo "--- 后端日志 (最近15行) ---"
                docker logs dong-medicine-backend --tail 15 2>/dev/null || true
              fi
              
              sleep 10
            done
            
            echo "========== 启动前端 =========="
            $COMPOSE_CMD up -d frontend
            
            echo "========== 最终状态 =========="
            $COMPOSE_CMD ps
            echo ""
            echo "✓ 部署完成!"

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/deploy_key
