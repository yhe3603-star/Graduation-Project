name: CI/CD Pipeline - Fast Deploy

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - component: backend
            context: ./dong-medicine-backend
            image: dong-medicine-backend
          - component: frontend
            context: ./dong-medicine-frontend
            image: dong-medicine-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_KKFILEVIEW_URL=/kkfileview
            VITE_KKFILEVIEW_FILE_HOST=http://${{ secrets.SERVER_HOST }}:8080

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config << EOF
          Host server
            HostName ${{ secrets.SERVER_HOST }}
            User ${{ secrets.SERVER_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking accept-new
            ConnectTimeout 30
            ServerAliveInterval 10
            ServerAliveCountMax 30
          EOF

      - name: Pre-check SSH connection
        run: |
          echo "检查 SSH 连接..."
          for i in {1..5}; do
            if ssh -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new server 'echo OK' 2>/dev/null; then
              echo "SSH 连接正常"
              exit 0
            fi
            echo "SSH 连接失败，等待 ${i}0 秒后重试..."
            sleep $((i * 10))
          done
          echo "ERROR: SSH 连接失败，请检查服务器状态"
          exit 1

      - name: Copy SQL file
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=30 server 'mkdir -p /opt/dong-medicine/sql' || true
          scp -o ConnectTimeout=30 dong-medicine-backend/sql/dong_medicine.sql server:/opt/dong-medicine/sql/ || true

      - name: Deploy
        run: |
          timeout 600 ssh -o ConnectTimeout=30 server 'bash -s' << 'SCRIPT'
          set -e
          
          echo "========== 开始部署 =========="
          date
          
          cd /opt/dong-medicine
          mkdir -p sql
          
          echo "========== 清理残留资源 =========="
          docker compose down --remove-orphans --timeout 30 2>/dev/null || true
          docker system prune -f 2>/dev/null || true
          
          echo "========== 登录GHCR =========="
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin || true
          
          echo "========== 创建docker-compose.yml =========="
          cat > docker-compose.yml << 'EOF'
          services:
            mysql:
              image: mysql:8.0
              container_name: dong-medicine-mysql
              restart: unless-stopped
              environment:
                MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
                MYSQL_DATABASE: dong_medicine
                TZ: Asia/Shanghai
              volumes:
                - mysql_data:/var/lib/mysql
                - ./sql/dong_medicine.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
              command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password --max_connections=500
              healthcheck:
                test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${{ secrets.MYSQL_ROOT_PASSWORD }}"]
                interval: 5s
                timeout: 3s
                retries: 10
                start_period: 20s
              deploy:
                resources:
                  limits:
                    cpus: '1'
                    memory: 1536M
              networks:
                - app-net

            redis:
              image: redis:7-alpine
              container_name: dong-medicine-redis
              restart: unless-stopped
              command: redis-server --appendonly yes --requirepass ${{ secrets.REDIS_PASSWORD }}
              volumes:
                - redis_data:/data
              healthcheck:
                test: ["CMD", "redis-cli", "-a", "${{ secrets.REDIS_PASSWORD }}", "ping"]
                interval: 5s
                timeout: 3s
                retries: 5
              deploy:
                resources:
                  limits:
                    cpus: '0.5'
                    memory: 256M
              networks:
                - app-net

            rabbitmq:
              image: rabbitmq:3.12-management
              container_name: dong-medicine-rabbitmq
              restart: unless-stopped
              environment:
                RABBITMQ_DEFAULT_USER: ${{ secrets.RABBITMQ_USER || 'admin' }}
                RABBITMQ_DEFAULT_PASS: ${{ secrets.RABBITMQ_PASSWORD || 'rabbitmq123' }}
                RABBITMQ_DEFAULT_VHOST: /
                TZ: Asia/Shanghai
              volumes:
                - rabbitmq_data:/var/lib/rabbitmq
              healthcheck:
                test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
                interval: 5s
                timeout: 5s
                retries: 10
                start_period: 30s
              deploy:
                resources:
                  limits:
                    cpus: '0.5'
                    memory: 512M
              networks:
                - app-net

            kkfileview:
              image: keking/kkfileview:4.1.0
              container_name: dong-medicine-kkfileview
              restart: unless-stopped
              environment:
                - KK_OFFICE_PREVIEW_TYPE=image
                - KK_CONTEXT_PATH=/kkfileview
                - KK_FILE_UPLOAD_MAX_SIZE=104857600
                - base.url=/kkfileview
              ports:
                - "8012:8012"
              volumes:
                - kkfileview_data:/opt/kkFileView-4.1.0/file
              deploy:
                resources:
                  limits:
                    cpus: '0.5'
                    memory: 1G
              networks:
                - app-net

            backend:
              image: ghcr.io/yhe3603-star/dong-medicine-backend:latest
              container_name: dong-medicine-backend
              restart: unless-stopped
              environment:
                SPRING_PROFILES_ACTIVE: prod
                DB_HOST: mysql
                DB_PORT: 3306
                DB_NAME: dong_medicine
                DB_USERNAME: root
                DB_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
                REDIS_HOST: redis
                REDIS_PORT: 6379
                REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
                RABBITMQ_HOST: rabbitmq
                RABBITMQ_PORT: 5672
                RABBITMQ_USER: ${{ secrets.RABBITMQ_USER || 'admin' }}
                RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD || 'rabbitmq123' }}
                APP_RABBITMQ_ENABLED: "true"
                JWT_SECRET: ${{ secrets.JWT_SECRET }}
                JWT_EXPIRATION: 86400000
                DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
                CORS_ALLOWED_ORIGIN: http://localhost
                FILE_UPLOAD_PATH: /app/public
                KKFILEVIEW_URL: http://kkfileview:8012
              volumes:
                - backend_public:/app/public
                - backend_logs:/app/logs
              depends_on:
                mysql:
                  condition: service_healthy
                redis:
                  condition: service_healthy
                rabbitmq:
                  condition: service_healthy
              ports:
                - "8080:8080"
              healthcheck:
                test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
                interval: 5s
                timeout: 3s
                retries: 20
                start_period: 120s
              deploy:
                resources:
                  limits:
                    cpus: '1'
                    memory: 1536M
              networks:
                - app-net

            frontend:
              image: ghcr.io/yhe3603-star/dong-medicine-frontend:latest
              container_name: dong-medicine-frontend
              restart: unless-stopped
              ports:
                - "80:80"
              depends_on:
                backend:
                  condition: service_started
              deploy:
                resources:
                  limits:
                    cpus: '0.5'
                    memory: 256M
              networks:
                - app-net

          volumes:
            mysql_data:
            redis_data:
            rabbitmq_data:
            kkfileview_data:
            backend_public:
            backend_logs:

          networks:
            app-net:
              driver: bridge
          EOF
          
          echo "========== 启动服务 =========="
          docker compose up -d --pull missing
          
          echo "========== 等待后端就绪 =========="
          for i in {1..50}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' dong-medicine-backend 2>/dev/null || echo "unknown")
            RUNNING=$(docker inspect --format='{{.State.Running}}' dong-medicine-backend 2>/dev/null || echo "false")
            echo "后端: $STATUS, 运行: $RUNNING ($i/50)"
            
            if [ "$STATUS" = "healthy" ]; then
              echo "后端就绪!"
              break
            fi
            
            if [ "$RUNNING" = "false" ]; then
              echo "ERROR: 后端容器崩溃"
              docker logs dong-medicine-backend --tail 50 2>&1 || true
              exit 1
            fi
            
            sleep 3
          done
          
          echo "========== 部署状态 =========="
          docker compose ps
          
          BACKEND_STATUS=$(docker inspect --format='{{.State.Health.Status}}' dong-medicine-backend 2>/dev/null || echo "unknown")
          if [ "$BACKEND_STATUS" != "healthy" ]; then
            echo "ERROR: 后端未就绪, 状态: $BACKEND_STATUS"
            docker logs dong-medicine-backend --tail 50 2>&1 || true
            exit 1
          fi
          
          echo "========== 部署完成 =========="
          date
          SCRIPT

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa
