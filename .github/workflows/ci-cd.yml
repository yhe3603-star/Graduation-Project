name: CI/CD Pipeline - Optimized Deploy

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend JAR
        working-directory: dong-medicine-backend
        run: mvn clean package -DskipTests -B

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dong-medicine-frontend/package-lock.json

      - name: Build Frontend
        working-directory: dong-medicine-frontend
        run: |
          npm ci
          VITE_API_BASE_URL=/api VITE_KKFILEVIEW_URL=/kkfileview npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./dong-medicine-backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dong-medicine-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./dong-medicine-frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dong-medicine-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config << EOF
          Host server
            HostName ${{ secrets.SERVER_HOST }}
            User ${{ secrets.SERVER_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            ConnectTimeout 30
            ServerAliveInterval 15
            ServerAliveCountMax 40
          EOF

      - name: Deploy
        run: |
          # 等待服务器恢复
          echo "Waiting 60 seconds for server to be ready..."
          sleep 60
          
          # SSH连接重试
          for i in 1 2 3 4 5 6; do
            echo "SSH attempt $i/6..."
            if ssh -o ConnectTimeout=60 -o ServerAliveInterval=15 -o ServerAliveCountMax=40 server 'echo "SSH connected"' 2>&1; then
              echo "SSH connection established!"
              break
            fi
            if [ $i -eq 6 ]; then
              echo "All SSH attempts failed!"
              exit 1
            fi
            WAIT=$((30 * i))
            echo "Connection failed, waiting ${WAIT} seconds..."
            sleep $WAIT
          done

          ssh server 'bash -s' << 'SCRIPT'
          set -e
          mkdir -p /opt/dong-medicine/sql /etc/docker
          cd /opt/dong-medicine

          curl -sL https://raw.githubusercontent.com/yhe3603-star/Graduation-Project/main/dong-medicine-backend/sql/dong_medicine.sql -o sql/dong_medicine.sql

          cat > /etc/docker/daemon.json << 'DAEMON'
          {
            "registry-mirrors": [
              "https://docker.1ms.run",
              "https://docker.rainbond.cc",
              "https://do.nark.eu.org"
            ],
            "log-driver": "json-file",
            "log-opts": {"max-size": "100m", "max-file": "3"}
          }
          DAEMON
          systemctl restart docker || true
          sleep 3

          cat > docker-compose.yml << 'EOF'
          services:
            mysql:
              image: mysql:8.0
              container_name: dong-medicine-mysql
              restart: unless-stopped
              environment:
                MYSQL_ROOT_PASSWORD: root123
                MYSQL_DATABASE: dong_medicine
                TZ: Asia/Shanghai
              volumes:
                - mysql_data:/var/lib/mysql
                - ./sql/dong_medicine.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
              command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
              networks:
                - app-net

            redis:
              image: redis:7-alpine
              container_name: dong-medicine-redis
              restart: unless-stopped
              command: redis-server --appendonly yes --requirepass redis123
              volumes:
                - redis_data:/data
              networks:
                - app-net

            kkfileview:
              image: keking/kkfileview:4.4.0
              container_name: dong-medicine-kkfileview
              restart: unless-stopped
              environment:
                - KK_OFFICE_PREVIEW_TYPE=image
                - KK_CONTEXT_PATH=/kkfileview
                - KK_FILE_UPLOAD_MAX_SIZE=104857600
                - base.url=/kkfileview
              ports:
                - "8012:8012"
              volumes:
                - kkfileview_data:/opt/kkFileView-4.1.0/file
              networks:
                - app-net

            backend:
              image: ghcr.io/yhe3603-star/dong-medicine-backend:latest
              container_name: dong-medicine-backend
              restart: unless-stopped
              environment:
                SPRING_PROFILES_ACTIVE: prod
                DB_HOST: mysql
                DB_PORT: 3306
                DB_NAME: dong_medicine
                DB_USERNAME: root
                DB_PASSWORD: root123
                REDIS_HOST: redis
                REDIS_PORT: 6379
                REDIS_PASSWORD: redis123
                JWT_SECRET: dong-medicine-jwt-secret-key-2024
                DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
              ports:
                - "8080:8080"
              depends_on:
                - mysql
                - redis
              networks:
                - app-net

            frontend:
              image: ghcr.io/yhe3603-star/dong-medicine-frontend:latest
              container_name: dong-medicine-frontend
              restart: unless-stopped
              ports:
                - "80:80"
              depends_on:
                - backend
              networks:
                - app-net

          volumes:
            mysql_data:
            redis_data:
            kkfileview_data:

          networks:
            app-net:
              driver: bridge
          EOF

          TABLE_COUNT=$(docker exec dong-medicine-mysql mysql -uroot -proot123 dong_medicine -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='dong_medicine'" -s -N 2>/dev/null || echo "0")
          if [ "$TABLE_COUNT" = "0" ] || [ -z "$TABLE_COUNT" ]; then
            echo "Database is empty, will re-initialize"
            docker compose down 2>/dev/null || true
            docker volume rm dong-medicine_mysql_data 2>/dev/null || true
          fi

          docker compose pull || docker compose pull
          docker compose up -d
          sleep 5
          docker compose ps
          SCRIPT

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa
