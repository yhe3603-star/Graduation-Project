name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: dong-medicine-backend
        run: mvn clean package -DskipTests -B

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: dong-medicine-backend/target/dong-medicine-backend-1.0.0.jar
          retention-days: 1

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dong-medicine-frontend/package-lock.json

      - name: Install dependencies
        working-directory: dong-medicine-frontend
        run: npm ci

      - name: Build frontend
        working-directory: dong-medicine-frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dong-medicine-frontend/dist
          retention-days: 1

  deploy:
    name: Deploy to Server
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./artifacts/backend

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./artifacts/frontend

      - name: Prepare deployment package
        run: |
          mkdir -p deploy-package
          cp ./artifacts/backend/dong-medicine-backend-1.0.0.jar deploy-package/dong-medicine-backend.jar
          cp -r ./artifacts/frontend deploy-package/frontend-dist
          cp -r dong-medicine-backend/public deploy-package/public
          cp deploy/nginx.conf deploy-package/
          cp deploy/dong-medicine-backend.service deploy-package/
          cp deploy/ci-deploy.sh deploy-package/
          chmod +x deploy-package/ci-deploy.sh

      - name: Create environment file
        run: |
          echo "SPRING_PROFILES_ACTIVE=prod" > deploy-package/.env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> deploy-package/.env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> deploy-package/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> deploy-package/.env
          echo "JWT_EXPIRATION=86400000" >> deploy-package/.env
          echo "CORS_ALLOWED_ORIGINS=http://${{ secrets.SERVER_HOST }},http://${{ secrets.SERVER_HOST }}:80" >> deploy-package/.env
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> deploy-package/.env
          echo "DEEPSEEK_BASE_URL=https://api.deepseek.com" >> deploy-package/.env
          echo "ADMIN_INIT_PASSWORD=${{ secrets.ADMIN_INIT_PASSWORD }}" >> deploy-package/.env
          echo "FILE_UPLOAD_BASE_PATH=/opt/dong-medicine/backend/public" >> deploy-package/.env
          echo "=== .env file created ==="
          ls -la deploy-package/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p /tmp/deploy"
          scp -r deploy-package/* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/deploy/
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd /tmp/deploy && chmod +x ci-deploy.sh && ./ci-deploy.sh"

      - name: Health check
        run: |
          sleep 30
          curl -f http://${{ secrets.SERVER_HOST }}/api/health || exit 1

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa
