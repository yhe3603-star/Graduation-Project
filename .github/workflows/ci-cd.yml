name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - component: backend
            context: ./dong-medicine-backend
            image: dong-medicine-backend
          - component: frontend
            context: ./dong-medicine-frontend
            image: dong-medicine-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_KKFILEVIEW_URL=/kkfileview
            VITE_KKFILEVIEW_FILE_HOST=http://${{ secrets.SERVER_HOST }}:8080

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: false
          command_timeout: 20m
          script: |
            set -e
            
            echo "========== 准备部署环境 =========="
            mkdir -p /opt/dong-medicine/sql
            cd /opt/dong-medicine
            
            echo "========== 创建配置文件 =========="
            cat > docker-compose.yml << 'EOF'
            services:
              mysql:
                image: mysql:8.0
                container_name: dong-medicine-mysql
                restart: unless-stopped
                environment:
                  MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
                  MYSQL_DATABASE: dong_medicine
                  TZ: Asia/Shanghai
                volumes:
                  - mysql_data:/var/lib/mysql
                command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
                  interval: 5s
                  timeout: 5s
                  retries: 20
                  start_period: 60s
                networks: [app-net]

              redis:
                image: redis:7-alpine
                container_name: dong-medicine-redis
                restart: unless-stopped
                command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
                volumes: [redis_data:/data]
                healthcheck:
                  test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
                  interval: 5s
                  timeout: 3s
                  retries: 10
                networks: [app-net]

              rabbitmq:
                image: rabbitmq:3.12-management
                container_name: dong-medicine-rabbitmq
                restart: unless-stopped
                environment:
                  RABBITMQ_DEFAULT_USER: admin
                  RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
                volumes: [rabbitmq_data:/var/lib/rabbitmq]
                healthcheck:
                  test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
                  interval: 5s
                  timeout: 5s
                  retries: 15
                  start_period: 30s
                networks: [app-net]

              kkfileview:
                image: keking/kkfileview:4.1.0
                container_name: dong-medicine-kkfileview
                restart: unless-stopped
                environment:
                  - KK_OFFICE_PREVIEW_TYPE=image
                  - KK_CONTEXT_PATH=/kkfileview
                ports: ["8012:8012"]
                volumes: [kkfileview_data:/opt/kkFileView-4.1.0/file]
                networks: [app-net]

              backend:
                image: ghcr.io/yhe3603-star/dong-medicine-backend:latest
                container_name: dong-medicine-backend
                restart: unless-stopped
                environment:
                  SPRING_PROFILES_ACTIVE: prod
                  DB_HOST: mysql
                  DB_PORT: 3306
                  DB_NAME: dong_medicine
                  DB_USERNAME: root
                  DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
                  REDIS_HOST: redis
                  REDIS_PORT: 6379
                  REDIS_PASSWORD: ${REDIS_PASSWORD}
                  RABBITMQ_HOST: rabbitmq
                  RABBITMQ_PORT: 5672
                  RABBITMQ_USER: admin
                  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
                  JWT_SECRET: ${JWT_SECRET}
                  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
                volumes: [backend_public:/app/public, backend_logs:/app/logs]
                ports: ["8080:8080"]
                healthcheck:
                  test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
                  interval: 10s
                  timeout: 5s
                  retries: 15
                  start_period: 120s
                networks: [app-net]

              frontend:
                image: ghcr.io/yhe3603-star/dong-medicine-frontend:latest
                container_name: dong-medicine-frontend
                restart: unless-stopped
                ports: ["80:80"]
                networks: [app-net]

            volumes:
              mysql_data:
              redis_data:
              rabbitmq_data:
              kkfileview_data:
              backend_public:
              backend_logs:

            networks:
              app-net:
            EOF

            cat > .env << EOF
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            EOF

            echo "========== 停止旧容器 =========="
            docker compose down --remove-orphans --timeout 10 --volumes 2>/dev/null || true

            echo "========== 启动新容器 =========="
            docker compose up -d

            echo "========== 等待服务就绪 =========="
            sleep 30
            docker compose ps

            echo "========== 检查后端健康 =========="
            for i in $(seq 1 36); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' dong-medicine-backend 2>/dev/null || echo "unknown")
              echo "[$i] 后端状态: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "✓ 部署成功!"
                docker compose ps
                exit 0
              fi
              sleep 10
            done

            echo "✗ 部署超时"
            docker logs dong-medicine-backend --tail 50
            exit 1
