name: CI/CD Pipeline - Docker Deploy

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build Backend with Maven
        working-directory: dong-medicine-backend
        run: mvn clean package -DskipTests -B

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dong-medicine-frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: dong-medicine-frontend
        run: npm ci

      - name: Build Frontend
        working-directory: dong-medicine-frontend
        run: npm run build

      - name: Upload Frontend Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dong-medicine-frontend/dist

  deploy:
    name: Deploy to Server
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Frontend Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dong-medicine-frontend/dist
          merge-multiple: true

      - name: Verify Frontend Build
        run: |
          echo "Checking dist directory..."
          ls -la dong-medicine-frontend/dist || echo "dist directory not found"
          if [ -d "dong-medicine-frontend/dist" ]; then
            echo "dist directory exists, contents:"
            ls -la dong-medicine-frontend/dist/
          else
            echo "ERROR: dist directory does not exist!"
            exit 1
          fi

      - name: Prepare deployment package
        run: |
          mkdir -p deploy-package
          cp docker-compose.yml deploy-package/
          cp -r dong-medicine-backend deploy-package/
          cp -r dong-medicine-frontend deploy-package/
          cp deploy/docker-deploy.sh deploy-package/
          cp deploy/init-server.sh deploy-package/
          chmod +x deploy-package/docker-deploy.sh
          chmod +x deploy-package/init-server.sh

      - name: Create production .env file
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" > deploy-package/.env
          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> deploy-package/.env
          echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> deploy-package/.env
          echo "MYSQL_PORT=3306" >> deploy-package/.env
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> deploy-package/.env
          echo "REDIS_PORT=6379" >> deploy-package/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> deploy-package/.env
          echo "JWT_EXPIRATION=86400000" >> deploy-package/.env
          echo "BACKEND_PORT=8080" >> deploy-package/.env
          echo "FRONTEND_PORT=80" >> deploy-package/.env
          echo "CORS_ALLOWED_ORIGIN=http://${{ secrets.SERVER_HOST }}" >> deploy-package/.env
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> deploy-package/.env

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload files to server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p /tmp/deploy"
          scp -r deploy-package/. ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/deploy/

      - name: Initialize Server (Install Docker)
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' << 'SCRIPT'
          if ! command -v docker &> /dev/null; then
            echo "Docker not installed, running initialization..."
            cd /tmp/deploy
            chmod +x init-server.sh
            sudo bash init-server.sh
          else
            echo "Docker already installed: $(docker --version)"
          fi
          SCRIPT

      - name: Deploy Application
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' << 'SCRIPT'
          cd /tmp/deploy
          chmod +x docker-deploy.sh
          sudo bash docker-deploy.sh
          SCRIPT

      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 60
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.SERVER_HOST }}:8080/actuator/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Health check attempt $i: HTTP $STATUS"
            sleep 10
          done
          echo "Health check failed, checking logs..."
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd /opt/dong-medicine && docker-compose logs --tail=100 backend" || true
          exit 1

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Successfully deployed to ${{ secrets.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: http://${{ secrets.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend API**: http://${{ secrets.SERVER_HOST }}:8080/api/" >> $GITHUB_STEP_SUMMARY
          echo "- **Swagger**: http://${{ secrets.SERVER_HOST }}:8080/swagger-ui/" >> $GITHUB_STEP_SUMMARY
