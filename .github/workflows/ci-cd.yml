name: CI/CD Pipeline - Docker Deploy

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  DEPLOY_DIR: /opt/dong-medicine
  SSH_TIMEOUT: 30
  SSH_RETRIES: 5

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build Backend with Maven
        working-directory: dong-medicine-backend
        run: mvn clean package -DskipTests -B

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dong-medicine-frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: dong-medicine-frontend
        run: npm ci

      - name: Build Frontend
        working-directory: dong-medicine-frontend
        env:
          VITE_API_BASE_URL: /api
          VITE_KKFILEVIEW_URL: /kkfileview
          VITE_KKFILEVIEW_FILE_HOST: http://${{ secrets.SERVER_HOST }}:8080
        run: npm run build

      - name: Verify Frontend Build Output
        working-directory: dong-medicine-frontend
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist directory does not exist after build!"
            exit 1
          fi
          echo "Build output: $(find dist -type f | wc -l) files"

      - name: Upload Frontend Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dong-medicine-frontend/dist

  deploy:
    name: Deploy to Server
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Frontend Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dong-medicine-frontend/dist

      - name: Prepare deployment package
        run: |
          mkdir -p deploy-package
          cp docker-compose.yml deploy-package/
          cp -r dong-medicine-backend deploy-package/
          cp -r dong-medicine-frontend deploy-package/
          cp deploy/docker-deploy.sh deploy-package/
          cp deploy/init-server.sh deploy-package/
          chmod +x deploy-package/docker-deploy.sh deploy-package/init-server.sh

      - name: Create production .env file
        run: |
          cat > deploy-package/.env << EOF
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_PORT=3307
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          REDIS_PORT=6379
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION=86400000
          BACKEND_PORT=8080
          FRONTEND_PORT=80
          CORS_ALLOWED_ORIGIN=http://${{ secrets.SERVER_HOST }}
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          KKFILEVIEW_PORT=8012
          EOF

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config << EOF
          Host server
            HostName ${{ secrets.SERVER_HOST }}
            User ${{ secrets.SERVER_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ConnectTimeout 30
            ServerAliveInterval 30
            ServerAliveCountMax 10
            TCPKeepAlive yes
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Test SSH connection
        run: |
          echo "Testing SSH connection with retries..."
          for i in 1 2 3 4 5; do
            echo "Attempt $i of 5..."
            if ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "echo 'SSH connection successful'" 2>&1; then
              echo "SSH connection established!"
              exit 0
            fi
            echo "Connection failed, waiting 10 seconds before retry..."
            sleep 10
          done
          echo "All SSH connection attempts failed!"
          exit 1

      - name: Upload files to server
        run: |
          echo "Uploading files with retry..."
          for i in 1 2 3; do
            if ssh server "mkdir -p /tmp/deploy" && scp -r deploy-package/. server:/tmp/deploy/; then
              echo "Files uploaded successfully!"
              exit 0
            fi
            echo "Upload attempt $i failed, retrying in 5 seconds..."
            sleep 5
          done
          echo "Failed to upload files after 3 attempts"
          exit 1

      - name: Initialize Server (Install Docker)
        run: |
          ssh server 'bash -s' << 'SCRIPT'
          if ! command -v docker &> /dev/null; then
            echo "Docker not installed, running initialization..."
            cd /tmp/deploy && sudo bash init-server.sh
          else
            echo "Docker already installed: $(docker --version)"
          fi
          SCRIPT

      - name: Deploy Application
        run: |
          ssh server 'bash -s' << 'SCRIPT'
          set -e
          cd /tmp/deploy
          chmod +x docker-deploy.sh
          
          export DOCKER_BUILDKIT=0
          export COMPOSE_DOCKER_CLI_BUILD=0
          echo "BuildKit disabled for better compatibility"
          
          sudo -E bash docker-deploy.sh --no-cache
          SCRIPT

      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 60

          for attempt in 1 2 3 4 5 6; do
            HEALTH=$(ssh server 'curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health 2>/dev/null || echo "000"')
            echo "Health check attempt $attempt: HTTP $HEALTH"
            
            if [ "$HEALTH" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            
            [ $attempt -lt 6 ] && sleep 15
          done

          echo "Health check failed, checking container status..."
          CONTAINER_STATUS=$(ssh server 'docker ps -a --filter name=dong-medicine-backend --format "{{.Status}}"')
          echo "Backend container: $CONTAINER_STATUS"

          if [[ "$CONTAINER_STATUS" == *"Up"* ]]; then
            echo "Container running, likely operational."
            exit 0
          else
            echo "Container not running. Deployment failed."
            ssh server "cd /opt/dong-medicine && docker compose logs --tail=50 backend 2>/dev/null || docker logs dong-medicine-backend 2>/dev/null"
            exit 1
          fi

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: http://${{ secrets.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend API**: http://${{ secrets.SERVER_HOST }}:8080/api/" >> $GITHUB_STEP_SUMMARY
          echo "- **Swagger**: http://${{ secrets.SERVER_HOST }}:8080/swagger-ui/" >> $GITHUB_STEP_SUMMARY
