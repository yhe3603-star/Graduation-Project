name: CI/CD Pipeline - Optimized Deploy

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build backend with Maven
        run: |
          cd dong-medicine-backend
          mvn clean package -DskipTests -B

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dong-medicine-frontend/package-lock.json

      - name: Build frontend with npm
        run: |
          cd dong-medicine-frontend
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./dong-medicine-backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dong-medicine-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./dong-medicine-frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dong-medicine-frontend:latest
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_KKFILEVIEW_URL=/kkfileview
            VITE_KKFILEVIEW_FILE_HOST=http://${{ secrets.SERVER_HOST }}:8080
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config << EOF
          Host server
            HostName ${{ secrets.SERVER_HOST }}
            User ${{ secrets.SERVER_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            ConnectTimeout 30
            ServerAliveInterval 15
            ServerAliveCountMax 40
          EOF

      - name: Deploy
        run: |
          ssh server 'bash -s' << 'SCRIPT'
          set -e
          mkdir -p /opt/dong-medicine /etc/docker
          cd /opt/dong-medicine
          
          # 配置Docker镜像加速器
          cat > /etc/docker/daemon.json << 'DAEMON'
          {
            "registry-mirrors": [
              "https://docker.1ms.run",
              "https://docker.rainbond.cc",
              "https://do.nark.eu.org"
            ],
            "log-driver": "json-file",
            "log-opts": {"max-size": "100m", "max-file": "3"}
          }
          DAEMON
          systemctl restart docker || true
          sleep 3
          
          cat > docker-compose.yml << 'EOF'
          services:
            mysql:
              image: mysql:8.0
              container_name: dong-medicine-mysql
              restart: unless-stopped
              environment:
                MYSQL_ROOT_PASSWORD: root123
                MYSQL_DATABASE: dong_medicine
                TZ: Asia/Shanghai
              volumes:
                - mysql_data:/var/lib/mysql
              command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
              networks:
                - app-net

            redis:
              image: redis:7-alpine
              container_name: dong-medicine-redis
              restart: unless-stopped
              command: redis-server --appendonly yes --requirepass redis123
              volumes:
                - redis_data:/data
              networks:
                - app-net

            kkfileview:
              image: kkfileview/kkfileview:latest
              container_name: dong-medicine-kkfileview
              restart: unless-stopped
              environment:
                - KK_OFFICE_PREVIEW_TYPE=image
                - KK_CONTEXT_PATH=/kkfileview
                - KK_FILE_UPLOAD_MAX_SIZE=104857600
                - base.url=/kkfileview
              ports:
                - "8012:8012"
              volumes:
                - kkfileview_data:/opt/kkFileView-4.1.0/file
              networks:
                - app-net
              deploy:
                restart_policy:
                  condition: on-failure
                  delay: 5s
                  max_attempts: 3

            backend:
              image: ghcr.io/yhe3603-star/dong-medicine-backend:latest
              container_name: dong-medicine-backend
              restart: unless-stopped
              environment:
                SPRING_PROFILES_ACTIVE: prod
                DB_HOST: mysql
                DB_PORT: 3306
                DB_NAME: dong_medicine
                DB_USERNAME: root
                DB_PASSWORD: root123
                REDIS_HOST: redis
                REDIS_PORT: 6379
                REDIS_PASSWORD: redis123
                JWT_SECRET: dong-medicine-jwt-secret-key-2024
                DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
              ports:
                - "8080:8080"
              depends_on:
                - mysql
                - redis
              networks:
                - app-net

            frontend:
              image: ghcr.io/yhe3603-star/dong-medicine-frontend:latest
              container_name: dong-medicine-frontend
              restart: unless-stopped
              ports:
                - "80:80"
              depends_on:
                - backend
              networks:
                - app-net

          volumes:
            mysql_data:
            redis_data:
            kkfileview_data:

          networks:
            app-net:
              driver: bridge
          EOF

          # 拉取镜像，忽略kkfileview的错误
          docker compose pull mysql redis backend frontend || true
          docker compose pull kkfileview 2>/dev/null || echo "kkfileview pull failed, continuing..."
          
          # 启动核心服务
          docker compose up -d mysql redis backend frontend
          
          # 尝试启动kkfileview（可选）
          docker compose up -d kkfileview 2>/dev/null || echo "kkfileview not available, skipping..."
          
          sleep 5
          docker compose ps
          SCRIPT

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa
