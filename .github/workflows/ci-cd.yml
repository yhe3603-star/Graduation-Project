name: CI/CD Pipeline - Optimized Deploy

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build backend with Maven
        run: |
          cd dong-medicine-backend
          mvn clean package -DskipTests -B

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dong-medicine-frontend/package-lock.json

      - name: Build frontend with npm
        run: |
          cd dong-medicine-frontend
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./dong-medicine-backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dong-medicine-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./dong-medicine-frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dong-medicine-frontend:latest
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_KKFILEVIEW_URL=/kkfileview
            VITE_KKFILEVIEW_FILE_HOST=http://${{ secrets.SERVER_HOST }}:8080
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config << EOF
          Host server
            HostName ${{ secrets.SERVER_HOST }}
            User ${{ secrets.SERVER_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking accept-new
            ConnectTimeout 60
            ServerAliveInterval 10
            ServerAliveCountMax 120
          EOF

      - name: Copy SQL file
        run: |
          ssh server 'mkdir -p /opt/dong-medicine/sql'
          scp dong-medicine-backend/sql/dong_medicine.sql server:/opt/dong-medicine/sql/

      - name: Deploy
        run: |
          ssh server 'bash -s' << 'SCRIPT'
          set -e
          
          echo "========== 开始部署 =========="
          date
          
          mkdir -p /opt/dong-medicine /etc/docker
          cd /opt/dong-medicine
          
          echo "========== 配置Docker镜像加速器 =========="
          if [ ! -f /etc/docker/daemon.json ] || ! grep -q "docker.1ms.run" /etc/docker/daemon.json 2>/dev/null; then
            cat > /etc/docker/daemon.json << 'DAEMON'
          {
            "registry-mirrors": [
              "https://docker.1ms.run",
              "https://docker.rainbond.cc"
            ],
            "log-driver": "json-file",
            "log-opts": {"max-size": "100m", "max-file": "3"}
          }
          DAEMON
            echo "重启Docker服务..."
            systemctl restart docker || true
            sleep 3
          else
            echo "Docker镜像加速器已配置，跳过"
          fi
          
          echo "========== 创建docker-compose.yml =========="
          cat > docker-compose.yml << 'EOF'
          services:
            mysql:
              image: mysql:8.0
              container_name: dong-medicine-mysql
              restart: unless-stopped
              environment:
                MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
                MYSQL_DATABASE: dong_medicine
                TZ: Asia/Shanghai
              volumes:
                - mysql_data:/var/lib/mysql
                - ./sql/dong_medicine.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
              command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password --max_connections=500
              healthcheck:
                test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${{ secrets.MYSQL_ROOT_PASSWORD }}"]
                interval: 10s
                timeout: 5s
                retries: 10
                start_period: 30s
              deploy:
                resources:
                  limits:
                    cpus: '1'
                    memory: 1536M
              networks:
                - app-net

            redis:
              image: redis:7-alpine
              container_name: dong-medicine-redis
              restart: unless-stopped
              command: redis-server --appendonly yes --requirepass ${{ secrets.REDIS_PASSWORD }}
              volumes:
                - redis_data:/data
              healthcheck:
                test: ["CMD", "redis-cli", "-a", "${{ secrets.REDIS_PASSWORD }}", "ping"]
                interval: 10s
                timeout: 5s
                retries: 5
              deploy:
                resources:
                  limits:
                    cpus: '0.5'
                    memory: 256M
              networks:
                - app-net

            rabbitmq:
              image: rabbitmq:3.12-management
              container_name: dong-medicine-rabbitmq
              restart: unless-stopped
              environment:
                RABBITMQ_DEFAULT_USER: ${{ secrets.RABBITMQ_USER || 'admin' }}
                RABBITMQ_DEFAULT_PASS: ${{ secrets.RABBITMQ_PASSWORD || 'rabbitmq123' }}
                RABBITMQ_DEFAULT_VHOST: /
                TZ: Asia/Shanghai
              volumes:
                - rabbitmq_data:/var/lib/rabbitmq
              healthcheck:
                test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
                interval: 10s
                timeout: 10s
                retries: 10
                start_period: 40s
              deploy:
                resources:
                  limits:
                    cpus: '0.5'
                    memory: 512M
              networks:
                - app-net

            kkfileview:
              image: keking/kkfileview:4.1.0
              container_name: dong-medicine-kkfileview
              restart: unless-stopped
              environment:
                - KK_OFFICE_PREVIEW_TYPE=image
                - KK_CONTEXT_PATH=/kkfileview
                - KK_FILE_UPLOAD_MAX_SIZE=104857600
                - base.url=/kkfileview
              ports:
                - "8012:8012"
              volumes:
                - kkfileview_data:/opt/kkFileView-4.1.0/file
              deploy:
                resources:
                  limits:
                    cpus: '0.5'
                    memory: 1G
              networks:
                - app-net

            backend:
              image: ghcr.io/yhe3603-star/dong-medicine-backend:latest
              container_name: dong-medicine-backend
              restart: unless-stopped
              environment:
                SPRING_PROFILES_ACTIVE: prod
                DB_HOST: mysql
                DB_PORT: 3306
                DB_NAME: dong_medicine
                DB_USERNAME: root
                DB_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
                REDIS_HOST: redis
                REDIS_PORT: 6379
                REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
                RABBITMQ_HOST: rabbitmq
                RABBITMQ_PORT: 5672
                RABBITMQ_USER: ${{ secrets.RABBITMQ_USER || 'admin' }}
                RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD || 'rabbitmq123' }}
                APP_RABBITMQ_ENABLED: "true"
                JWT_SECRET: ${{ secrets.JWT_SECRET }}
                JWT_EXPIRATION: 86400000
                DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
                CORS_ALLOWED_ORIGIN: http://localhost
                FILE_UPLOAD_PATH: /app/public
                KKFILEVIEW_URL: http://kkfileview:8012
              volumes:
                - backend_public:/app/public
                - backend_logs:/app/logs
              depends_on:
                mysql:
                  condition: service_healthy
                redis:
                  condition: service_healthy
                rabbitmq:
                  condition: service_healthy
              ports:
                - "8080:8080"
              healthcheck:
                test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
                interval: 10s
                timeout: 5s
                retries: 15
                start_period: 180s
              deploy:
                resources:
                  limits:
                    cpus: '1'
                    memory: 1G
              networks:
                - app-net

            frontend:
              image: ghcr.io/yhe3603-star/dong-medicine-frontend:latest
              container_name: dong-medicine-frontend
              restart: unless-stopped
              ports:
                - "80:80"
              depends_on:
                backend:
                  condition: service_started
              deploy:
                resources:
                  limits:
                    cpus: '0.5'
                    memory: 256M
              networks:
                - app-net

          volumes:
            mysql_data:
            redis_data:
            rabbitmq_data:
            kkfileview_data:
            backend_public:
            backend_logs:

          networks:
            app-net:
              driver: bridge
          EOF

          echo "========== 拉取镜像 =========="
          
          pull_with_retry() {
            local image=$1
            local max_retries=3
            local retry=0
            while [ $retry -lt $max_retries ]; do
              echo "拉取镜像: $image (尝试 $((retry+1))/$max_retries)"
              if docker pull "$image"; then
                echo "成功: $image"
                return 0
              fi
              retry=$((retry+1))
              echo "失败，等待10秒后重试..."
              sleep 10
            done
            echo "警告: $image 拉取失败，继续部署"
            return 1
          }
          
          echo ">>> 拉取基础镜像..."
          pull_with_retry mysql:8.0 &
          pull_with_retry redis:7-alpine &
          wait
          
          echo ">>> 拉取应用镜像..."
          pull_with_retry ghcr.io/yhe3603-star/dong-medicine-backend:latest &
          pull_with_retry ghcr.io/yhe3603-star/dong-medicine-frontend:latest &
          wait
          
          echo ">>> 拉取kkfileview镜像..."
          pull_with_retry keking/kkfileview:4.1.0 || true
          
          echo "========== 停止旧容器 =========="
          docker compose down --remove-orphans 2>/dev/null || true
          
          echo "========== 启动服务 =========="
          COMPOSE_HTTP_TIMEOUT=120 docker compose up -d --timeout 120
          
          echo "========== 等待后端启动 =========="
          for i in {1..60}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' dong-medicine-backend 2>/dev/null || echo "unknown")
            RUNNING=$(docker inspect --format='{{.State.Running}}' dong-medicine-backend 2>/dev/null || echo "false")
            echo "后端状态: $STATUS, 运行中: $RUNNING ($i/60)"
            
            if [ "$STATUS" = "healthy" ]; then
              echo "后端就绪!"
              break
            fi
            
            if [ "$RUNNING" = "false" ]; then
              echo "========== 后端容器已停止! 日志: =========="
              docker logs dong-medicine-backend --tail 100 2>&1 || true
              echo "ERROR: 后端容器崩溃"
              exit 1
            fi
            
            if [ "$i" -eq 15 ] || [ "$i" -eq 30 ] || [ "$i" -eq 45 ]; then
              echo "========== 后端日志 (最近50行) =========="
              docker logs dong-medicine-backend --tail 50 2>&1 || true
            fi
            
            sleep 5
          done
          
          echo "========== 部署状态 =========="
          docker compose ps
          
          echo "========== 后端日志 =========="
          docker logs dong-medicine-backend --tail 100 2>&1 || true
          
          BACKEND_STATUS=$(docker inspect --format='{{.State.Health.Status}}' dong-medicine-backend 2>/dev/null || echo "unknown")
          if [ "$BACKEND_STATUS" != "healthy" ]; then
            echo "ERROR: 后端未就绪, 状态: $BACKEND_STATUS"
            exit 1
          fi
          
          echo "========== 部署完成 =========="
          date
          SCRIPT

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa
