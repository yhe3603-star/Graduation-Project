name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - component: backend
            context: ./dong-medicine-backend
            image: dong-medicine-backend
          - component: frontend
            context: ./dong-medicine-frontend
            image: dong-medicine-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_KKFILEVIEW_URL=/kkfileview
            VITE_KKFILEVIEW_FILE_HOST=http://${{ secrets.SERVER_HOST }}:8080

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config << EOF
          Host server
            HostName ${{ secrets.SERVER_HOST }}
            User ${{ secrets.SERVER_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking accept-new
            ConnectTimeout 30
            ServerAliveInterval 5
            ServerAliveCountMax 6
          EOF

      - name: Copy files
        run: |
          ssh server 'mkdir -p /opt/dong-medicine/sql'
          scp dong-medicine-backend/sql/dong_medicine.sql server:/opt/dong-medicine/sql/

      - name: Create docker-compose.yml
        run: |
          ssh server 'cat > /opt/dong-medicine/docker-compose.yml << '\''EOF'\''
          services:
            mysql:
              image: mysql:8.0
              container_name: dong-medicine-mysql
              restart: unless-stopped
              environment:
                MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
                MYSQL_DATABASE: dong_medicine
                TZ: Asia/Shanghai
              volumes:
                - mysql_data:/var/lib/mysql
                - ./sql/dong_medicine.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
              command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
              healthcheck:
                test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
                interval: 5s
                timeout: 3s
                retries: 10
                start_period: 20s
              networks:
                - app-net

            redis:
              image: redis:7-alpine
              container_name: dong-medicine-redis
              restart: unless-stopped
              command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
              volumes:
                - redis_data:/data
              healthcheck:
                test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
                interval: 5s
                timeout: 3s
                retries: 5
              networks:
                - app-net

            rabbitmq:
              image: rabbitmq:3.12-management
              container_name: dong-medicine-rabbitmq
              restart: unless-stopped
              environment:
                RABBITMQ_DEFAULT_USER: admin
                RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
              volumes:
                - rabbitmq_data:/var/lib/rabbitmq
              healthcheck:
                test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
                interval: 5s
                timeout: 5s
                retries: 10
                start_period: 30s
              networks:
                - app-net

            kkfileview:
              image: keking/kkfileview:4.1.0
              container_name: dong-medicine-kkfileview
              restart: unless-stopped
              environment:
                - KK_OFFICE_PREVIEW_TYPE=image
                - KK_CONTEXT_PATH=/kkfileview
              ports:
                - "8012:8012"
              volumes:
                - kkfileview_data:/opt/kkFileView-4.1.0/file
              networks:
                - app-net

            backend:
              image: ghcr.io/yhe3603-star/dong-medicine-backend:latest
              container_name: dong-medicine-backend
              restart: unless-stopped
              environment:
                SPRING_PROFILES_ACTIVE: prod
                DB_HOST: mysql
                DB_PORT: 3306
                DB_NAME: dong_medicine
                DB_USERNAME: root
                DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
                REDIS_HOST: redis
                REDIS_PORT: 6379
                REDIS_PASSWORD: ${REDIS_PASSWORD}
                RABBITMQ_HOST: rabbitmq
                RABBITMQ_PORT: 5672
                RABBITMQ_USER: admin
                RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
                JWT_SECRET: ${JWT_SECRET}
                DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
              volumes:
                - backend_public:/app/public
                - backend_logs:/app/logs
              depends_on:
                mysql:
                  condition: service_healthy
                redis:
                  condition: service_healthy
                rabbitmq:
                  condition: service_healthy
              ports:
                - "8080:8080"
              healthcheck:
                test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
                interval: 5s
                timeout: 3s
                retries: 20
                start_period: 120s
              networks:
                - app-net

            frontend:
              image: ghcr.io/yhe3603-star/dong-medicine-frontend:latest
              container_name: dong-medicine-frontend
              restart: unless-stopped
              ports:
                - "80:80"
              depends_on:
                backend:
                  condition: service_started
              networks:
                - app-net

          volumes:
            mysql_data:
            redis_data:
            rabbitmq_data:
            kkfileview_data:
            backend_public:
            backend_logs:

          networks:
            app-net:
              driver: bridge
          EOF'
          
          # 创建 .env 文件
          ssh server 'cat > /opt/dong-medicine/.env << '\''EOF'\''
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          EOF'

      - name: Trigger deployment
        run: |
          # 创建部署脚本
          ssh server 'cat > /opt/dong-medicine/deploy.sh << '\''DEPLOY_SCRIPT'\''
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/dong-medicine-deploy.log"
          STATUS_FILE="/opt/dong-medicine/deploy.status"
          
          echo "========== $(date) 开始部署 ==========" >> $LOG_FILE
          echo "running" > $STATUS_FILE
          
          cd /opt/dong-medicine
          
          # 清理旧容器
          docker compose down --remove-orphans --timeout 30 2>/dev/null || true
          
          # 启动服务
          docker compose up -d --pull missing 2>&1 >> $LOG_FILE
          
          # 等待后端就绪
          for i in {1..60}; do
            if docker exec dong-medicine-backend curl -sf http://localhost:8080/actuator/health 2>/dev/null; then
              echo "$(date) 后端就绪" >> $LOG_FILE
              echo "success" > $STATUS_FILE
              exit 0
            fi
            sleep 3
          done
          
          echo "$(date) 后端未就绪" >> $LOG_FILE
          echo "failed" > $STATUS_FILE
          exit 1
          DEPLOY_SCRIPT
          chmod +x /opt/dong-medicine/deploy.sh'
          
          # 后台启动部署
          ssh server 'nohup /opt/dong-medicine/deploy.sh > /dev/null 2>&1 &'
          
          echo "部署已在服务器后台启动"

      - name: Wait for deployment
        run: |
          echo "等待部署完成..."
          for i in {1..40}; do
            STATUS=$(ssh server 'cat /opt/dong-medicine/deploy.status 2>/dev/null || echo "unknown"')
            echo "状态: $STATUS ($i/40)"
            
            case $STATUS in
              success)
                echo "部署成功!"
                exit 0
                ;;
              failed)
                echo "部署失败!"
                ssh server 'tail -50 /var/log/dong-medicine-deploy.log'
                exit 1
                ;;
            esac
            
            sleep 5
          done
          
          echo "部署超时!"
          ssh server 'tail -50 /var/log/dong-medicine-deploy.log'
          exit 1

      - name: Show logs
        if: always()
        run: ssh server 'tail -100 /var/log/dong-medicine-deploy.log' || true

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa
