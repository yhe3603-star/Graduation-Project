name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        working-directory: dong-medicine-backend
        run: |
          chmod +x mvnw
          ./mvnw test -B --no-transfer-progress -T 2C

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: dong-medicine-backend/target/site/jacoco/

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dong-medicine-frontend/package-lock.json

      - name: Install and Test
        working-directory: dong-medicine-frontend
        run: |
          npm ci --prefer-offline
          npm run test -- --passWithNoTests

      - name: Security audit
        working-directory: dong-medicine-frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: dong-medicine-frontend/coverage/

  test-e2e:
    name: E2E Tests
    needs: test-frontend
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: dong_medicine
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot123"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=15
          --health-start-period=30s
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=5
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load database schema and seed data
        run: |
          mysql -h 127.0.0.1 -uroot -proot123 < dong-medicine-backend/sql/dong_medicine.sql
          echo "Database loaded. Verifying table count:"
          mysql -h 127.0.0.1 -uroot -proot123 -e "SELECT COUNT(*) AS table_count FROM information_schema.tables WHERE table_schema = 'dong_medicine';"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Start backend
        id: backend
        working-directory: dong-medicine-backend
        run: |
          chmod +x mvnw
          nohup ./mvnw spring-boot:run -B --no-transfer-progress \
            -Dspring-boot.run.profiles=dev \
            -Dspring.flyway.enabled=false \
            > /tmp/backend.log 2>&1 &
          echo "Waiting for backend to start (up to 3 minutes)..."
          for i in $(seq 1 36); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend ready!"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Backend failed to start within 3 minutes"
          exit 1
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_USERNAME: root
          DB_PASSWORD: root123
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: "6379"
          REDIS_PASSWORD: ""
          JWT_SECRET: e2e-test-secret-key-that-is-long-enough-for-validation-32c
          JWT_EXPIRATION: "86400000"
          CORS_ORIGIN_1: http://localhost:3000
          CORS_ORIGIN_2: http://localhost
          DEEPSEEK_API_KEY: ""
          ADMIN_INIT_PASSWORD: admin123

      - name: Backend logs (on failure)
        if: failure() && steps.backend.outcome == 'failure'
        run: tail -80 /tmp/backend.log

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dong-medicine-frontend/package-lock.json

      - name: Install dependencies
        working-directory: dong-medicine-frontend
        run: npm ci --prefer-offline

      - name: Install Playwright browsers
        working-directory: dong-medicine-frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: dong-medicine-frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080/api

      - name: Run E2E tests
        working-directory: dong-medicine-frontend
        run: npx playwright test --project=chromium
        env:
          CI: true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dong-medicine-frontend/playwright-report/
          retention-days: 7

  security-scan:
    name: Security Scan
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

  sonarqube:
    name: SonarQube Analysis
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check SonarQube secrets
        id: check-sonar
        env:
          SONAR_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOK: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_URL" ] && [ -n "$SONAR_TOK" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SonarQube secrets (SONAR_HOST_URL, SONAR_TOKEN) not configured. Skipping scan."
          fi
      - uses: actions/checkout@v4
        if: steps.check-sonar.outputs.available == 'true'
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        if: steps.check-sonar.outputs.available == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Compile backend
        if: steps.check-sonar.outputs.available == 'true'
        working-directory: dong-medicine-backend
        run: |
          chmod +x mvnw
          ./mvnw compile -B --no-transfer-progress -DskipTests
      - name: SonarQube Scan
        if: steps.check-sonar.outputs.available == 'true'
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build-and-push:
    name: Build & Push
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      backend_image: ${{ steps.build-backend.outputs.imageid }}
      frontend_image: ${{ steps.build-frontend.outputs.imageid }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: ./dong-medicine-backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-backend:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          provenance: false
          sbom: false

      - name: Build and push frontend
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./dong-medicine-frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-frontend:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_KKFILEVIEW_URL=/kkfileview
            VITE_KKFILEVIEW_FILE_HOST=http://${{ secrets.SERVER_HOST }}:8080
          provenance: false
          sbom: false

      - name: Verify images pushed
        run: |
          echo "Backend image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-backend:latest"
          echo "Frontend image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-frontend:latest"
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-backend:latest
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-frontend:latest

  deploy:
    name: Deploy
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload config files to server
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          REMOTE="${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"

          ssh $SSH_OPTS $REMOTE "mkdir -p /opt/dong-medicine/deploy/monitoring/grafana/provisioning /opt/dong-medicine/dong-medicine-backend/sql /opt/dong-medicine/dong-medicine-backend/public"

          scp $SSH_OPTS docker-compose.yml $REMOTE:/opt/dong-medicine/docker-compose.yml
          scp $SSH_OPTS deploy/monitoring/prometheus.yml $REMOTE:/opt/dong-medicine/deploy/monitoring/prometheus.yml
          scp $SSH_OPTS dong-medicine-backend/sql/dong_medicine.sql $REMOTE:/opt/dong-medicine/dong-medicine-backend/sql/dong_medicine.sql
          rsync -avz -e "ssh $SSH_OPTS" deploy/monitoring/grafana/provisioning/ $REMOTE:/opt/dong-medicine/deploy/monitoring/grafana/provisioning/

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: false
          command_timeout: 25m
          script: |
            export PATH=$PATH:/usr/bin:/usr/local/bin
            COMPOSE_CMD="docker compose"
            APP_DIR="/opt/dong-medicine"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            
            echo "========== 清理旧容器 =========="
            $COMPOSE_CMD down --remove-orphans --timeout 10 2>/dev/null || true
            
            echo "========== 创建环境配置 =========="
            cat > .env << ENVEOF
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=86400000
            FRONTEND_PORT=80
            CORS_ALLOWED_ORIGIN=http://${{ secrets.SERVER_HOST }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            APP_RABBITMQ_ENABLED=true
            ENVEOF
            
            echo "========== 登录 GHCR =========="
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin || true
            
            echo "========== 拉取最新镜像 =========="
            echo "拉取 backend 镜像..."
            docker pull ghcr.io/${{ github.repository_owner }}/dong-medicine-backend:latest || echo "警告: backend 镜像拉取失败，将使用本地镜像"
            echo "拉取 frontend 镜像..."
            docker pull ghcr.io/${{ github.repository_owner }}/dong-medicine-frontend:latest || echo "警告: frontend 镜像拉取失败，将使用本地镜像"
            echo "镜像拉取完成"
            
            echo "========== 启动基础服务 (mysql, redis, rabbitmq, kkfileview) =========="
            $COMPOSE_CMD up -d mysql redis rabbitmq kkfileview
            
            echo "========== 等待基础服务就绪 =========="
            for i in $(seq 1 50); do
              MYSQL_STATUS=$(docker inspect --format='{{.State.Health.Status}}' dong-medicine-mysql 2>/dev/null || echo "unknown")
              REDIS_STATUS=$(docker inspect --format='{{.State.Health.Status}}' dong-medicine-redis 2>/dev/null || echo "unknown")
              RABBITMQ_STATUS=$(docker inspect --format='{{.State.Health.Status}}' dong-medicine-rabbitmq 2>/dev/null || echo "unknown")
              echo "[$i] MySQL: $MYSQL_STATUS, Redis: $REDIS_STATUS, RabbitMQ: $RABBITMQ_STATUS"
              if [ "$MYSQL_STATUS" = "healthy" ] && [ "$REDIS_STATUS" = "healthy" ] && [ "$RABBITMQ_STATUS" = "healthy" ]; then
                echo "✓ 基础服务就绪!"
                break
              fi
              if [ $i -eq 50 ]; then
                echo "✗ 基础服务未就绪"
                docker logs dong-medicine-mysql --tail 30 2>/dev/null || true
                docker logs dong-medicine-redis --tail 30 2>/dev/null || true
                docker logs dong-medicine-rabbitmq --tail 30 2>/dev/null || true
                exit 1
              fi
              sleep 5
            done
            
            echo "========== 启动后端 =========="
            $COMPOSE_CMD up -d backend
            
            echo "========== 等待后端就绪 (最多8分钟) =========="
            for i in $(seq 1 48); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' dong-medicine-backend 2>/dev/null || echo "unknown")
              echo "[$i] 后端状态: $STATUS"
              
              if [ "$STATUS" = "healthy" ]; then
                echo "✓ 后端服务就绪!"
                break
              fi
              
              if [ "$STATUS" = "unhealthy" ]; then
                echo "✗ 后端服务不健康，输出日志..."
                docker logs dong-medicine-backend --tail 100
                exit 1
              fi
              
              if ! docker ps --format '{{.Names}}' | grep -q dong-medicine-backend; then
                echo "✗ 后端容器已停止，输出日志..."
                docker logs dong-medicine-backend --tail 100
                exit 1
              fi
              
              if [ $((i % 6)) -eq 0 ]; then
                echo "--- 后端日志 (最近15行) ---"
                docker logs dong-medicine-backend --tail 15 2>/dev/null || true
              fi
              
              sleep 10
            done
            
            echo "========== 启动前端 =========="
            $COMPOSE_CMD up -d frontend
            
            echo "========== 最终状态 =========="
            $COMPOSE_CMD ps
            echo ""
            echo "✓ 部署完成!"

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/deploy_key
