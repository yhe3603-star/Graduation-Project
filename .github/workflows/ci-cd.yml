name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        working-directory: dong-medicine-backend
        run: |
          chmod +x mvnw
          ./mvnw test -B --no-transfer-progress -T 2C

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dong-medicine-frontend/package-lock.json

      - name: Install and Test
        working-directory: dong-medicine-frontend
        run: |
          npm ci --prefer-offline
          npm run test -- --passWithNoTests || true

  build-and-push:
    name: Build & Push
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      backend_image: ${{ steps.build-backend.outputs.imageid }}
      frontend_image: ${{ steps.build-frontend.outputs.imageid }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: ./dong-medicine-backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-backend:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          provenance: false
          sbom: false

      - name: Build and push frontend
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./dong-medicine-frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-frontend:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_KKFILEVIEW_URL=/kkfileview
            VITE_KKFILEVIEW_FILE_HOST=http://${{ secrets.SERVER_HOST }}:8080
          provenance: false
          sbom: false

      - name: Verify images pushed
        run: |
          echo "Backend image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-backend:latest"
          echo "Frontend image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-frontend:latest"
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-backend:latest
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ github.repository_owner }}/dong-medicine-frontend:latest

  deploy:
    name: Deploy
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: false
          command_timeout: 15m
          script: |
            set -e
            
            APP_DIR="/opt/dong-medicine"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            
            echo "========== 创建环境配置 =========="
            cat > .env << ENVEOF
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=86400000
            FRONTEND_PORT=3000
            CORS_ALLOWED_ORIGIN=http://${{ secrets.SERVER_HOST }}:3000
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            ENVEOF
            
            echo "========== 创建 docker-compose.yml =========="
            cat > docker-compose.yml << 'EOF'
            services:
              mysql:
                image: mysql:8.0
                container_name: dong-medicine-mysql
                restart: unless-stopped
                environment:
                  MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
                  MYSQL_DATABASE: dong_medicine
                  TZ: Asia/Shanghai
                volumes:
                  - mysql_data:/var/lib/mysql
                command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
                  interval: 5s
                  timeout: 3s
                  retries: 10
                  start_period: 20s
                networks: [app-net]

              redis:
                image: redis:7-alpine
                container_name: dong-medicine-redis
                restart: unless-stopped
                command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
                volumes:
                  - redis_data:/data
                healthcheck:
                  test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
                  interval: 5s
                  timeout: 2s
                  retries: 5
                networks: [app-net]

              rabbitmq:
                image: rabbitmq:3.12-management
                container_name: dong-medicine-rabbitmq
                restart: unless-stopped
                environment:
                  RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
                  RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
                volumes:
                  - rabbitmq_data:/var/lib/rabbitmq
                healthcheck:
                  test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
                  interval: 5s
                  timeout: 5s
                  retries: 10
                  start_period: 20s
                networks: [app-net]

              kkfileview:
                image: keking/kkfileview:4.1.0
                container_name: dong-medicine-kkfileview
                restart: unless-stopped
                environment:
                  - KK_OFFICE_PREVIEW_TYPE=image
                  - KK_CONTEXT_PATH=/kkfileview
                ports: ["8012:8012"]
                volumes: [kkfileview_data:/opt/kkFileView-4.1.0/file]
                networks: [app-net]

              backend:
                image: ghcr.io/yhe3603-star/dong-medicine-backend:latest
                container_name: dong-medicine-backend
                restart: unless-stopped
                environment:
                  SPRING_PROFILES_ACTIVE: prod
                  DB_HOST: mysql
                  DB_PORT: 3306
                  DB_NAME: dong_medicine
                  DB_USERNAME: root
                  DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
                  REDIS_HOST: redis
                  REDIS_PORT: 6379
                  REDIS_PASSWORD: ${REDIS_PASSWORD}
                  RABBITMQ_HOST: rabbitmq
                  RABBITMQ_PORT: 5672
                  RABBITMQ_USER: ${RABBITMQ_USER}
                  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
                  JWT_SECRET: ${JWT_SECRET}
                  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
                volumes:
                  - backend_public:/app/public
                  - backend_logs:/app/logs
                depends_on:
                  mysql: {condition: service_healthy}
                  redis: {condition: service_healthy}
                  rabbitmq: {condition: service_healthy}
                ports: ["8080:8080"]
                healthcheck:
                  test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
                  interval: 10s
                  timeout: 5s
                  retries: 10
                  start_period: 60s
                networks: [app-net]

              frontend:
                image: ghcr.io/yhe3603-star/dong-medicine-frontend:latest
                container_name: dong-medicine-frontend
                restart: unless-stopped
                ports: ["80:80"]
                depends_on:
                  backend: {condition: service_started}
                networks: [app-net]

            volumes:
              mysql_data:
              redis_data:
              rabbitmq_data:
              kkfileview_data:
              backend_public:
              backend_logs:

            networks:
              app-net:
            EOF
            
            echo "========== 登录 GHCR =========="
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin || true
            
            echo "========== 启动服务 =========="
            docker compose up -d
            
            echo "========== 等待就绪 (最多5分钟) =========="
            for i in $(seq 1 30); do
              if docker exec dong-medicine-backend curl -sf http://localhost:8080/actuator/health 2>/dev/null; then
                echo "✓ 服务就绪!"
                docker compose ps
                exit 0
              fi
              echo "等待... ($i/30)"
              sleep 10
            done
            
            echo "✗ 服务未就绪"
            docker compose ps
            docker logs dong-medicine-backend --tail 100
            exit 1
