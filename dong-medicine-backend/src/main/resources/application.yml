server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:mysql://localhost:3306/dong_medicine?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
      file-size-threshold: 2KB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10000ms

jwt:
  expiration: ${JWT_EXPIRATION:86400000}

app:
  security:
    jwt-secret: ${JWT_SECRET:dev-secret-key-for-jwt-token-generation-must-be-at-least-64-characters-long-for-hs512}
    jwt-expiration: ${JWT_EXPIRATION:86400000}
    jwt-refresh-threshold-minutes: ${JWT_REFRESH_THRESHOLD:30}
    jwt-refresh-grace-days: ${JWT_REFRESH_GRACE_DAYS:7}
    cors-allowed-origins:
      - ${CORS_ORIGIN_1:http://localhost:5173}
      - ${CORS_ORIGIN_2:http://localhost:3000}
      - ${CORS_ORIGIN_3:http://127.0.0.1:5173}
  cache:
    enabled: true
    default-expire-time: 3600000
  logging:
    performance-monitoring: true
    request-logging: true
    database-monitoring: true
  search:
    use-fulltext: true
  request:
    max-body-size: ${MAX_BODY_SIZE:10485760}

file:
  upload:
    base-path: ${user.dir}/public

logging:
  level:
    com.dongmedicine: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
      probes:
        enabled: true
    caches:
      enabled: true
    metrics:
      enabled: true
  health:
    db:
      enabled: true
    caches:
      enabled: true
    diskspace:
      enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
