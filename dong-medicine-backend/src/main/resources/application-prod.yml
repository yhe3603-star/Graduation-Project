server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  flyway:
    enabled: false
  autoconfigure:
    exclude: ${SPRING_AUTOCONFIGURE_EXCLUDE:}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/dong_medicine?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 2
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      pool-name: DongMedicineHikariPool
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
      file-size-threshold: 2KB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: 5000ms
          max-idle: 4
          min-idle: 2
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /
    connection-timeout: 10000
    requested-heartbeat: 60
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        prefetch: 10
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2.0

jwt:
  expiration: ${JWT_EXPIRATION:86400000}

sa-token:
  token-name: Authorization
  timeout: ${SA_TOKEN_TIMEOUT:604800}
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false
  is-read-cookie: false
  is-read-body: false
  is-read-header: true
  token-prefix: Bearer
  jwt-secret-key: ${JWT_SECRET}

app:
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
      - http://localhost:5173
  rabbitmq:
    enabled: ${APP_RABBITMQ_ENABLED:true}
  cache:
    enabled: true
    default-expire-time: 3600000
    max-size: 1000
    expire-minutes: 60
  logging:
    performance-monitoring: false
    request-logging: true
    database-monitoring: false
  search:
    use-fulltext: true
  websocket:
    allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost,http://localhost:3000,http://localhost:5173,http://127.0.0.1}
  request:
    max-body-size: ${MAX_BODY_SIZE:10485760}

file:
  upload:
    base-path: /app/public
    image-max-size: 10485760
    video-max-size: 52428800
    document-max-size: 52428800
    allowed-image-extensions: jpg,jpeg,png,gif,bmp,webp
    allowed-video-extensions: mp4,avi,mov,wmv,flv,mkv
    allowed-document-extensions: pdf,docx,doc,xlsx,xls,pptx,ppt,txt
  kkfileview:
    url: ${KKFILEVIEW_URL:http://localhost:8012}

logging:
  level:
    com.dongmedicine: INFO
    cn.dev33.satoken: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /app/logs/dong-medicine.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30
      total-size-cap: 1GB

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
  health:
    db:
      enabled: true
    redis:
      enabled: false
    rabbit:
      enabled: false
    diskspace:
      enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: https://api.deepseek.com
  model: deepseek-chat
  connect-timeout: 10
  read-timeout: 60
