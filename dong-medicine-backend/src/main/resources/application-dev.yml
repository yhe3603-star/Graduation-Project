server:
  port: 8080

spring:
  application:
    name: dong-medicine-backend
  datasource:
    url: jdbc:mysql://localhost:3306/dong_medicine?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1200000
      connection-test-query: SELECT 1
      pool-name: DongMedicineHikariPool
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
      file-size-threshold: 2KB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

jwt:
  expiration: ${JWT_EXPIRATION:86400000}

app:
  security:
    jwt-secret: ${JWT_SECRET:}
    jwt-expiration: ${JWT_EXPIRATION:7200000}
    cors-allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
      - http://localhost:8080
      - http://127.0.0.1:5173
      - http://127.0.0.1:3000
      - http://127.0.0.1:8080
  cache:
    enabled: true
    default-expire-time: 3600000
  logging:
    performance-monitoring: true
    request-logging: true
    database-monitoring: true

logging:
  level:
    com.dongmedicine: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
    jmx:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
    caches:
      enabled: true
    metrics:
      enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

file:
  upload:
    base-path: ${user.dir}/public
    image-max-size: 10485760
    video-max-size: 104857600
    document-max-size: 52428800
    allowed-image-extensions: jpg,jpeg,png,gif,bmp,webp
    allowed-video-extensions: mp4,avi,mov,wmv,flv,mkv
    allowed-document-extensions: pdf,docx,doc,xlsx,xls,pptx,ppt,txt

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: https://api.deepseek.com
  model: deepseek-chat
