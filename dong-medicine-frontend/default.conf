upstream backend {
    server backend:8080;
    keepalive 32;
}

map $http_origin $cors_origin {
    default "";
    "~^http://localhost:[0-9]+" $http_origin;
    "~^http://127\.0\.0\.1:[0-9]+" $http_origin;
    "~^https?://dongmedicine\.com" $http_origin;
    "~^https?://.*\.dongmedicine\.com" $http_origin;
    "~^http://[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+" $http_origin;
    "~^http://[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$" $http_origin;
    "~^https://[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+" $http_origin;
    "~^https://[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$" $http_origin;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl http2;
    server_name localhost;

    # SSL certificates
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    root /usr/share/nginx/html;
    index index.html;

    # HSTS header (1 year, include subdomains)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Static resource caching (excluding backend-proxied paths)
    location ~* ^/(?!images/|videos/|documents/|kkfileview/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Static resource proxy - images
    location /images/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # Cache settings
        proxy_cache_valid 200 1d;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Static resource proxy - videos
    location /videos/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_set_header Connection "";

        # Video streaming - Range requests
        proxy_buffering on;
        proxy_force_ranges on;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=86400";
    }

    # Static resource proxy - documents
    location /documents/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        expires 1d;
        add_header Cache-Control "public";
    }

    # WebSocket proxy - AI chat streaming
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # API proxy
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        # Block OPTIONS preflight from non-whitelisted origins
        if ($cors_origin = "") {
            set $block_request "1";
        }
        if ($request_method = 'OPTIONS') {
            set $block_request "${block_request}O";
        }
        if ($block_request = "1O") {
            return 403;
        }

        # Handle OPTIONS preflight request
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$cors_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Cache-Control, Content-Type, X-Requested-With, userid, Userid, UserId' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 3600 always;
            add_header 'Content-Length' 0 always;
            add_header 'Content-Type' 'text/plain charset=UTF-8' always;
            return 204;
        }

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Actuator health check - disabled, not exposed to public
    # location /actuator/ {
    #     proxy_pass http://backend;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }

    # kkfileview document preview service proxy
    location /kkfileview/ {
        proxy_pass http://kkfileview:8012/kkfileview/;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header Accept-Encoding "";

        # Handle kkfileview redirects
        proxy_redirect http://kkfileview:8012/kkfileview/ /kkfileview/;
        proxy_redirect http://localhost:8012/kkfileview/ /kkfileview/;
        proxy_redirect http://kkfileview:8012/ /kkfileview/;
        proxy_redirect http://localhost:8012/ /kkfileview/;

        # Preview service may take longer for large files
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Support large file previews
        client_max_body_size 100M;

        # Return friendly message when kkfileview is unavailable
        proxy_intercept_errors on;
        error_page 502 503 504 = @kkfileview_unavailable;

        # Allow kkfileview embedding in iframe
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Replace internal addresses in response content
        sub_filter 'http://kkfileview:8012/kkfileview/' '/kkfileview/';
        sub_filter 'http://kkfileview:8012' '/kkfileview';
        sub_filter 'http://localhost:8012/kkfileview/' '/kkfileview/';
        sub_filter 'http://localhost:8012/kkfileview' '/kkfileview';
        sub_filter 'http://localhost:8012' '/kkfileview';
        sub_filter 'http://localhost:80/kkfileview/' '/kkfileview/';
        sub_filter 'http://localhost:80/kkfileview' '/kkfileview';
        sub_filter_once off;
        sub_filter_types text/html application/javascript application/json text/css;
    }

    # Redirect /kkfileview to /kkfileview/
    location = /kkfileview {
        return 301 /kkfileview/;
    }

    location @kkfileview_unavailable {
        default_type application/json;
        return 503 '{"code":503,"msg":"文档预览服务暂未启动，请使用 docker compose up -d kkfileview 启动","data":null}';
    }

    # Health check endpoint - includes backend connectivity
    location /health {
        proxy_pass http://backend/actuator/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # File upload size limit
    client_max_body_size 100M;

    # Vue Router history mode support
    location / {
        try_files $uri $uri/ /index.html;
        # Disable HTML entry caching to ensure browser loads latest version
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
