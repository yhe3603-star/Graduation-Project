upstream backend {
    server backend:8080;
    keepalive 32;
}

map $http_origin $cors_origin {
    default "";
    "~^http://localhost:[0-9]+" $http_origin;
    "~^http://127\.0\.0\.1:[0-9]+" $http_origin;
    "~^https?://dongmedicine\.com" $http_origin;
    "~^https?://.*\.dongmedicine\.com" $http_origin;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 静态资源缓存（排除后端代理的路径）
    location ~* ^/(?!images/|videos/|documents/|kkfileview/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 静态资源代理 - 图片
    location /images/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        
        # 缓存设置
        proxy_cache_valid 200 1d;
        expires 1d;
        add_header Cache-Control "public";
    }

    # 静态资源代理 - 视频
    location /videos/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        
        # 视频流支持
        proxy_buffering off;
        proxy_request_buffering off;
        expires 1d;
        add_header Cache-Control "public";
    }

    # 静态资源代理 - 文档
    location /documents/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        
        expires 1d;
        add_header Cache-Control "public";
    }

    # WebSocket代理 - AI聊天流式输出
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # API代理
    location /api/ {
        # 非白名单来源拒绝 OPTIONS 预检请求
        if ($cors_origin = "") {
            set $block_request "1";
        }
        if ($request_method = 'OPTIONS') {
            set $block_request "${block_request}O";
        }
        if ($block_request = "1O") {
            return 403;
        }

        # 处理 OPTIONS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$cors_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Cache-Control, Content-Type, X-Requested-With, userid, Userid, UserId' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 3600 always;
            add_header 'Content-Length' 0 always;
            add_header 'Content-Type' 'text/plain charset=UTF-8' always;
            return 204;
        }

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Actuator健康检查 - 已禁用，不暴露给外网
    # location /actuator/ {
    #     proxy_pass http://backend;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }

    # kkfileview 文档预览服务代理
    location /kkfileview/ {
        proxy_pass http://kkfileview:8012/kkfileview/;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header Accept-Encoding "";
        
        # 预览服务需要较长时间处理大文件
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # 支持大文件预览
        client_max_body_size 100M;
        
        # kkfileview未启动时返回友好提示
        proxy_intercept_errors on;
        error_page 502 503 504 = @kkfileview_unavailable;
        
        # 替换响应内容中的内部地址和错误端口
        # 注意：sub_filter默认处理text/html，不需要显式指定
        sub_filter 'http://kkfileview:8012/kkfileview/' '/kkfileview/';
        sub_filter 'http://kkfileview:8012' '/kkfileview';
        sub_filter 'http://localhost:80/kkfileview/' '/kkfileview/';
        sub_filter 'http://localhost:80/kkfileview' '/kkfileview';
        sub_filter '"url":"http://kkfileview:8012' '"url":"/kkfileview';
        sub_filter "'url':'http://kkfileview:8012" "'url':'/kkfileview";
        sub_filter_once off;
        sub_filter_types application/javascript application/json text/css;
    }
    
    # 重定向 /kkfileview 到 /kkfileview/
    location = /kkfileview {
        return 301 /kkfileview/;
    }
    
    location @kkfileview_unavailable {
        default_type application/json;
        return 503 '{"code":503,"msg":"文档预览服务暂未启动，请使用 docker compose up -d kkfileview 启动","data":null}';
    }

    # 健康检查端点 - 包含后端连通性
    location /health {
        proxy_pass http://backend/actuator/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # 文件上传大小限制
    client_max_body_size 100M;

    # Vue Router history模式支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
