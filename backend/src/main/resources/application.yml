server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:mysql://localhost:3306/dong_medicine?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
      file-size-threshold: 2KB

jwt:
  secret: ${JWT_SECRET:default-dev-secret-key-for-jwt-token-generation-must-be-at-least-64-chars-long}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  security:
    jwt-secret: ${JWT_SECRET:default-dev-secret-key-for-jwt-token-generation-must-be-at-least-64-chars-long}
    jwt-expiration: ${JWT_EXPIRATION:86400000}
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

file:
  upload:
    base-path: ${user.dir}/public

logging:
  level:
    com.dongmedicine: INFO
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
      probes:
        enabled: true
    caches:
      enabled: true
    metrics:
      enabled: true
  health:
    db:
      enabled: true
    caches:
      enabled: true
    diskspace:
      enabled: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
