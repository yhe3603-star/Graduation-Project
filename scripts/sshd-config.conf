# SSH 服务器配置优化
# 文件位置: /etc/ssh/sshd_config.d/99-max-connections.conf
# 创建命令: sudo nano /etc/ssh/sshd_config.d/99-max-connections.conf

# 增加最大会话数（默认 10）
MaxSessions 50

# 增加最大启动连接数（默认 10:30:100）
# 格式: start:rate:full
# start: 开始拒绝前的最大未认证连接数
# rate: 当达到 start 后，每秒拒绝的概率增加百分比
# full: 拒绝所有新连接的阈值
MaxStartups 100:30:200

# 减少登录超时（默认 120 秒）
LoginGraceTime 30

# 启用 TCP KeepAlive
TCPKeepAlive yes

# 客户端存活检查
ClientAliveInterval 60
ClientAliveCountMax 3

# 应用配置:
# sudo systemctl restart sshd
