services:
  mysql:
    image: mysql:8.0
    container_name: dong-medicine-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: dong_medicine
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./dong-medicine-backend/sql/dong_medicine.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - dong-medicine-network

  redis:
    image: redis:7-alpine
    container_name: dong-medicine-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - dong-medicine-network

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: dong-medicine-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq123}
      RABBITMQ_DEFAULT_VHOST: /
      TZ: Asia/Shanghai
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - dong-medicine-network

  kkfileview:
    image: keking/kkfileview:latest
    container_name: dong-medicine-kkfileview
    restart: unless-stopped
    environment:
      - KK_OFFICE_PREVIEW_TYPE=image
      - KK_CONTEXT_PATH=/kkfileview
      - KK_FILE_UPLOAD_MAX_SIZE=104857600
      - base.url=http://localhost:3000/kkfileview
      - KK_DOMAIN=http://localhost:3000
    volumes:
      - kkfileview_data:/opt/kkFileView-4.1.0/file
    extra_hosts:
      - "localhost:host-gateway"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    networks:
      - dong-medicine-network

  backend:
    build:
      context: ./dong-medicine-backend
    image: dong-medicine-backend:latest
    container_name: dong-medicine-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: dong_medicine
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-rabbitmq123}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:3000}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      FILE_UPLOAD_PATH: /app/public
      KKFILEVIEW_URL: http://kkfileview:8012
    volumes:
      - ./dong-medicine-backend/public:/app/public
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1536M
    networks:
      - dong-medicine-network

  frontend:
    build:
      context: ./dong-medicine-frontend
      args:
        - VITE_API_BASE_URL=/api
        - VITE_KKFILEVIEW_URL=/kkfileview
        - VITE_KKFILEVIEW_FILE_HOST=http://backend:8080
    image: dong-medicine-frontend:latest
    container_name: dong-medicine-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - dong-medicine-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  kkfileview_data:
    driver: local

networks:
  dong-medicine-network:
    driver: bridge
