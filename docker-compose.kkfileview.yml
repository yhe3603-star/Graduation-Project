services:
  kkfileview:
    image: keking/kkfileview:latest
    container_name: kkfileview
    ports:
      - "8012:8012"
    environment:
      - KK_OFFICE_PREVIEW_TYPE=image
      - KK_CONTEXT_PATH=/
    volumes:
      - ./kkfileview/file:/opt/kkFileView-4.1.0/file
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012"]
      interval: 30s
      timeout: 10s
      retries: 3
